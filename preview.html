<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>[미리보기] 우리 반 애니메이션 스튜디오</title>
  <link href="https://fonts.googleapis.com/css2?family=Jua&family=Gaegu:wght@400;700&display=swap" rel="stylesheet">
  <style>
  :root {
    --bg1: #fdf3df; --bg2: #f6ead0;
    --ink: #4a3a22; --muted: #9a865f;
    --primary: #7c5cff; --primary-d: #5b3df0;
    --accent: #ff7eb6; --accent-d:#e85b97;
    --green: #2bc48a; --green-d:#1ea273;
    --yellow: #ffcf4d; --card: #ffffff; --line: #ece8f7; --heart: #ff4d6d;
    --shadow: 0 1vmin 3vmin rgba(90,60,200,.16);
    --radius: 2.2vmin;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; height: 100%; }

  /* ===== 스케일 기반 반응형: 화면이 커지면 글씨도 함께 커집니다 (1.5배 확대) ===== */
  html { font-size: clamp(24px, 4vmin, 46px); }

  body {
    font-family: 'Jua', 'Gaegu', system-ui, sans-serif;
    color: var(--ink);
    background: linear-gradient(160deg, var(--bg1), var(--bg2));
    overflow: hidden;
    -webkit-text-size-adjust: 100%;
  }
  .hidden { display: none !important; }

  /* ===== 전체 무대: 크림 배경 위에 패널 한 장이 떠 있음 ===== */
  .stage { height: 100dvh; height: 100vh; display: flex; justify-content: center; align-items: stretch; padding: clamp(.5rem, 2vmin, 1.4rem); }

  /* 패널 = 바깥 틀. 이 안에 [상단메뉴 - 내용 - 이동버튼]이 모두 들어갑니다 */
  .panel {
    width: 100%; max-width: min(96vw, 880px); display: flex; flex-direction: column;
    background: #fffaf0; border: .2rem solid #f0e3c4; border-radius: 2rem;
    box-shadow: var(--shadow); overflow: hidden;
  }

  .topbar {
    flex: none; display: flex; align-items: center; gap: .6rem;
    padding: .5rem .9rem; background: #fff6e4;
    border-bottom: .15rem solid #f0e3c4;
  }
  .topbar__home { font-size: 1.5rem; border: none; background: none; cursor: pointer; }
  .topbar__right { margin-left: auto; display: flex; align-items: center; gap: .5rem; }
  .whoami { color: var(--primary-d); font-size: 1rem; font-weight: 700; max-width: 30vw; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .steps { display: flex; gap: .35rem; overflow: hidden; }
  .step-dot { font-size: .82rem; color: var(--muted); padding: .25rem .7rem; border-radius: 999px; background: #f1edff; white-space: nowrap; }
  .step-dot.active { background: var(--primary); color: #fff; }
  .step-dot.done { background: #dff7ec; color: var(--green); }
  @media (max-width: 620px) { .step-dot { font-size: .7rem; padding: .2rem .45rem; } .step-dot .lbl { display:none; } }

  /* ===== 페이지 영역 ===== */
  .app { flex: 1; min-height: 0; position: relative; overflow: hidden; }
  .page {
    position: absolute; inset: 0; display: flex; flex-direction: column;
    padding: clamp(.8rem, 2.6vmin, 2.2rem);
    gap: .7rem;
  }
  .page__head { flex: none; text-align: center; }
  .page__title { font-size: clamp(1.6rem, 4.4vmin, 2.6rem); margin: 0; line-height: 1.15; }
  .page__sub { font-size: 1.02rem; color: var(--muted); margin: .25rem 0 0; }
  .page__body { flex: 1; min-height: 0; display: flex; flex-direction: column; gap: .8rem; }
  .scroll-area { flex: 1; min-height: 0; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: .2rem; }
  .center-col { flex: 1; min-height: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1rem; }

  @keyframes slideNext { from { opacity: 0; transform: translateX(7%); } to { opacity: 1; transform: none; } }
  @keyframes slidePrev { from { opacity: 0; transform: translateX(-7%); } to { opacity: 1; transform: none; } }
  .page.dir-next { animation: slideNext .26s ease; }
  .page.dir-prev { animation: slidePrev .26s ease; }

  /* ===== 아래 이동 바 ===== */
  .navbar {
    flex: none; display: flex; align-items: center; justify-content: space-between; gap: .6rem;
    padding: clamp(.5rem, 1.6vmin, 1.1rem) clamp(.8rem, 2.6vmin, 2.2rem);
    background: #fff6e4; border-top: .15rem solid #f0e3c4;
  }
  .navbar .nav-center { flex: 1; text-align: center; color: var(--muted); font-size: .95rem; }
  .navbar > span { min-width: 2rem; }

  /* ===== 공통 요소 ===== */
  h2 { font-size: 1.4rem; margin: 0 0 .5rem; }
  h3 { font-size: 1.15rem; margin: 0 0 .4rem; }
  .card {
    background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow);
    padding: clamp(.9rem, 2.4vmin, 1.6rem); border: .15rem solid #fff;
  }

  .btn {
    font-family: inherit; font-size: 1.15rem; font-weight: 700; line-height: 1;
    border: none; border-radius: .8rem; padding: .75em 1.3em;
    background: var(--primary); color: #fff; cursor: pointer;
    box-shadow: 0 .35rem 0 var(--primary-d); transition: transform .08s, box-shadow .08s;
  }
  .btn:active { transform: translateY(.25rem); box-shadow: 0 .1rem 0 var(--primary-d); }
  .btn.big { font-size: 1.5rem; padding: .8em 1.5em; }
  .btn.ghost { background: #fff; color: var(--primary-d); box-shadow: 0 .25rem 0 var(--line); border: .15rem solid var(--line); }
  .btn.accent { background: var(--accent); box-shadow: 0 .35rem 0 var(--accent-d); }
  .btn.green { background: var(--green); box-shadow: 0 .35rem 0 var(--green-d); }
  .btn.gray { background: #c9c4dd; box-shadow: 0 .35rem 0 #aaa3c6; }
  .btn:disabled { filter: grayscale(.5); opacity: .5; cursor: not-allowed; box-shadow: none; transform: none; }
  .btn-row { display: flex; gap: .7rem; flex-wrap: wrap; align-items: center; }
  .icon-btn { font-size: 1.4rem; background: none; border: none; cursor: pointer; }
  .pill-btn { font-family: inherit; font-size: 1rem; font-weight: 700; border: .15rem solid var(--line); background: #fff; color: var(--primary-d); border-radius: 999px; padding: .4rem .9rem; cursor: pointer; }

  input[type=text], input[type=password], input[type=number], textarea, select {
    font-family: inherit; font-size: 1.2rem; width: 100%;
    border: .18rem solid var(--line); border-radius: .8rem; padding: .6em .7em;
    background: #fbfaff; color: var(--ink); outline: none;
  }
  input:focus, textarea:focus { border-color: var(--primary); }
  textarea { resize: none; }
  label.field { display: block; font-size: 1.05rem; color: var(--muted); margin: .8rem 0 .3rem; }

  /* ===== 입장: 명단 ===== */
  .logo { font-size: clamp(3rem, 11vmin, 6rem); line-height: 1; }
  .roster-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(clamp(7rem, 22vmin, 11rem), 1fr)); gap: .8rem; }
  .name-card {
    font-family: inherit; font-size: 1.3rem; cursor: pointer; font-weight: 700;
    border: .25rem solid var(--line); border-radius: 1.2rem; background: #fff;
    padding: 1.1rem .5rem; text-align: center; transition: transform .1s;
  }
  .name-card:hover, .name-card:active { transform: translateY(-.2rem); border-color: var(--primary); }
  .name-card .num { display: block; font-size: .85rem; color: var(--muted); font-weight: 400; }

  /* ===== 학습 ===== */
  .fact-grid { display: grid; grid-template-columns: 1fr 1fr; gap: .9rem; }
  @media (max-width: 560px) { .fact-grid { grid-template-columns: 1fr; } }
  .fact { background: linear-gradient(135deg,#fff,#f6f2ff); border-radius: 1.2rem; padding: 1rem 1.1rem; border: .15rem solid var(--line); }
  .fact .emoji { font-size: 2.4rem; }
  .fact h3 { font-size: 1.25rem; margin: .2rem 0; }
  .fact p { font-size: 1.02rem; margin: 0; color: #5a5478; }
  .flip-stage {
    width: clamp(9rem, 34vmin, 16rem); height: clamp(9rem, 34vmin, 16rem);
    border-radius: 1.5rem; background: #fff; border: .3rem solid var(--primary);
    display: flex; align-items: center; justify-content: center;
    font-size: clamp(5rem, 22vmin, 11rem); box-shadow: var(--shadow);
  }
  .step-chips { display: flex; gap: .6rem; flex-wrap: wrap; justify-content: center; }
  .chip { background: #fff; border: .15rem solid var(--line); border-radius: 1rem; padding: .7rem 1rem; cursor: pointer; font-size: 1rem; max-width: 14rem; }
  .chip b { font-size: 1.1rem; }
  .chip.active { border-color: var(--primary); background: #f4f0ff; }

  /* 설명 한 쪽씩 (왼쪽 큰 그림 + 오른쪽 설명) */
  .fact-page { flex: 1; min-height: 0; display: flex; gap: 1.2rem; align-items: stretch; }
  .fact-visual { flex: 0 0 36%; display: flex; align-items: center; justify-content: center; background: #fff; border-radius: 1.5rem; border: .15rem solid var(--line); }
  .fact-emoji { font-size: clamp(5rem, 24vmin, 13rem); }
  .fact-text { flex: 1; min-height: 0; overflow-y: auto; display: flex; flex-direction: column; gap: .9rem; font-size: 1.15rem; line-height: 1.6; }
  .fact-text p { margin: 0; }
  .fact-tip { background: #fff3d6; border-radius: 1rem; padding: .8rem 1.1rem; color: #8a6b32; font-size: 1.05rem; }
  @media (max-width: 640px) { .fact-page { flex-direction: column; } .fact-visual { flex: 0 0 32%; } }

  /* 플립 4단계: 왼쪽 미리보기/이모지 + 오른쪽 단계 목차 */
  .flip-layout { flex: 1; min-height: 0; display: flex; gap: 1.3rem; align-items: stretch; }
  .flip-left { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1.2rem; }
  .flip-right { flex: 1; min-height: 0; overflow-y: auto; display: flex; flex-direction: column; justify-content: center; }
  .toc { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: .7rem; }
  .toc li { display: flex; gap: .8rem; align-items: center; background: #fff; border: .18rem solid var(--line); border-radius: 1.1rem; padding: .9rem 1.1rem; cursor: pointer; }
  .toc li.active { border-color: var(--primary); background: #f4f0ff; }
  .toc .n { flex: none; width: 2.1rem; height: 2.1rem; border-radius: 50%; background: var(--primary); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; }
  .toc-txt { display: flex; flex-direction: column; gap: .15rem; min-width: 0; }
  .toc .t { font-size: 1.15rem; font-weight: 700; line-height: 1.25; }
  .toc .d { font-size: .98rem; color: var(--muted); line-height: 1.3; }
  @media (max-width: 640px) { .flip-layout { flex-direction: column; } }

  /* 자기평가: 왼쪽 영상 + 오른쪽 체크리스트 (스크롤 없이) */
  .eval-layout { flex: 1; min-height: 0; display: flex; gap: 1.2rem; align-items: stretch; }
  .eval-left { flex: 1; min-width: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: .5rem; }
  .eval-left .player-canvas { max-height: 100%; }
  .eval-right { flex: 1; min-width: 0; min-height: 0; overflow-y: auto; display: flex; flex-direction: column; gap: .5rem; }
  .eval-right h3 { margin: .2rem 0; }
  @media (max-width: 680px) { .eval-layout { flex-direction: column; } }

  /* 작은 버튼 (촬영 화면 등 공간 절약용) */
  .btn.sm { font-size: 1rem; padding: .5em 1.1em; }

  /* ===== 계획 ===== */
  .storyboard { display: grid; grid-template-columns: repeat(auto-fill, minmax(clamp(9rem, 30vmin, 14rem), 1fr)); gap: .8rem; }
  .sb-cell { background: #fff; border: .18rem dashed var(--line); border-radius: 1rem; padding: .7rem; }
  .sb-cell .sb-num { font-size: .95rem; color: var(--muted); display: flex; justify-content: space-between; }
  .sb-cell textarea { min-height: 4.5rem; font-size: 1rem; margin-top: .3rem; }
  .sb-cell .del { background: none; border: none; color: var(--heart); cursor: pointer; font-size: .95rem; }

  /* ===== 촬영 스튜디오 ===== */
  .tabbar { display: flex; gap: .4rem; justify-content: center; flex: none; }
  .tab { font-family: inherit; font-size: .95rem; font-weight: 700; border: none; cursor: pointer; padding: .35rem 1rem; border-radius: 999px; background: #efeaff; color: var(--primary-d); }
  .tab.active { background: var(--primary); color: #fff; }
  .cap-wrap { flex: 1; min-height: 0; display: flex; flex-direction: column; gap: .6rem; }
  .capture-box { position: relative; flex: 1; min-height: 0; background: #111; border-radius: 1.2rem; overflow: hidden; display: flex; align-items: center; justify-content: center; }
  .capture-box video, .capture-box img, .capture-box canvas { max-width: 100%; max-height: 100%; object-fit: contain; }
  .onion { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: contain; opacity: .35; pointer-events: none; }
  .capture-empty { color: #fff; opacity: .75; text-align: center; padding: 1rem; font-size: 1.05rem; }
  .player-canvas { width: 100%; aspect-ratio: 4/3; max-height: 100%; margin: auto; border-radius: 1.2rem; background: #000; display: block; }
  #capPreview { justify-content: center; align-items: center; }
  .frames-strip { display: flex; gap: .4rem; overflow-x: auto; padding: .3rem 0; flex: none; height: clamp(3rem, 8.5vmin, 4.4rem); }
  .frame-thumb { position: relative; flex: 0 0 auto; aspect-ratio: 4/3; height: 100%; border-radius: .6rem; overflow: hidden; border: .15rem solid var(--line); background: #000; }
  .frame-thumb img { width: 100%; height: 100%; object-fit: cover; }
  .frame-thumb .idx { position: absolute; left: .15rem; top: .1rem; font-size: .75rem; background: rgba(0,0,0,.55); color: #fff; padding: 0 .3rem; border-radius: .3rem; }
  .frame-thumb .del { position: absolute; right: .1rem; top: .05rem; background: var(--heart); color: #fff; border: none; border-radius: 50%; width: 1.3rem; height: 1.3rem; cursor: pointer; font-size: .75rem; line-height: 1; }
  .frame-thumb .mv { position: absolute; bottom: .1rem; background: rgba(0,0,0,.5); color: #fff; border: none; border-radius: .3rem; cursor: pointer; font-size: .8rem; }
  .frame-thumb .mv.l { left: .1rem; } .frame-thumb .mv.r { right: .1rem; }
  .speed-row { display: flex; align-items: center; gap: .6rem; flex: none; font-size: 1.4rem; }
  input[type=range] { flex: 1; accent-color: var(--primary); height: 1.6rem; }

  /* ===== 자기평가 ===== */
  .check-item { display: flex; align-items: center; gap: .7rem; padding: .8rem 1rem; border-radius: .9rem; cursor: pointer; border: .18rem solid var(--line); background: #fff; font-size: 1.12rem; }
  .check-item input { width: 1.7rem; height: 1.7rem; accent-color: var(--green); flex: none; }
  .check-item.checked { border-color: var(--green); background: #f1fbf6; }
  .stars { font-size: 1.9rem; cursor: pointer; letter-spacing: .25rem; user-select: none; white-space: nowrap; }
  .star { color: #d9d4ec; } .star.on { color: var(--yellow); }
  .peer-row { display: flex; align-items: center; justify-content: space-between; gap: .6rem; margin: .5rem 0; font-size: 1.05rem; }

  /* ===== 보드 ===== */
  .board-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(clamp(9rem, 27vmin, 14rem), 1fr)); gap: 1rem; }
  .vid-card { background: #fff; border-radius: 1.2rem; box-shadow: var(--shadow); overflow: hidden; cursor: pointer; border: .15rem solid #fff; transition: transform .12s; position: relative; }
  .vid-card:hover { transform: translateY(-.25rem); }
  .vid-card .rank { position: absolute; left: .5rem; top: .5rem; z-index: 2; background: var(--yellow); color: #7a5a00; font-weight: 700; border-radius: 999px; padding: .15rem .7rem; font-size: 1rem; box-shadow: var(--shadow); }
  .vid-card .thumb { width: 100%; aspect-ratio: 4/3; object-fit: cover; background: #eee; display: block; }
  .vid-card .meta { padding: .7rem .8rem; }
  .vid-card .meta h3 { margin: 0 0 .2rem; font-size: 1.15rem; }
  .vid-card .by { color: var(--muted); font-size: .95rem; }
  .vid-card .heart-line { display: flex; align-items: center; gap: .3rem; margin-top: .4rem; color: var(--heart); font-size: 1.2rem; font-weight: 700; }

  /* ===== 감상 모달 ===== */
  .modal-back { position: fixed; inset: 0; background: rgba(40,30,80,.55); display: flex; align-items: center; justify-content: center; z-index: 50; padding: 1rem; }
  .modal { background: #fff; border-radius: 1.6rem; max-width: 60rem; width: 100%; max-height: 94dvh; overflow: auto; box-shadow: var(--shadow); }
  .modal__body { padding: clamp(1rem, 3vmin, 2rem); }
  .modal__close { float: right; font-size: 1.7rem; border: none; background: none; cursor: pointer; color: var(--muted); }
  .watch-grid { display: grid; grid-template-columns: 1.2fr .9fr; gap: 1.2rem; }
  @media (max-width: 720px) { .watch-grid { grid-template-columns: 1fr; } }
  .watch-canvas { width: 100%; aspect-ratio: 4/3; border-radius: 1.2rem; background: #000; object-fit: contain; }
  .heart-btn { font-size: 2.2rem; background: none; border: none; cursor: pointer; transition: transform .1s; }
  .heart-btn:active { transform: scale(1.3); }
  .comment { background: #f7f5ff; border-radius: .8rem; padding: .55rem .7rem; margin-bottom: .5rem; font-size: 1.05rem; }
  .comment .who { color: var(--primary-d); font-weight: 700; }
  .comment-list { max-height: 14rem; overflow: auto; }

  /* ===== 토스트 / 로딩 ===== */
  .toast { position: fixed; left: 50%; bottom: 5rem; transform: translateX(-50%); background: var(--ink); color: #fff; padding: .7rem 1.3rem; border-radius: 999px; z-index: 80; box-shadow: var(--shadow); font-size: 1.1rem; animation: slideNext .2s; max-width: 90vw; text-align: center; }
  .loading { position: fixed; inset: 0; background: rgba(255,255,255,.78); display: flex; flex-direction: column; gap: .9rem; align-items: center; justify-content: center; z-index: 90; color: var(--primary-d); font-size: 1.3rem; }
  .loading__spinner { width: 3.4rem; height: 3.4rem; border: .45rem solid #e3dcff; border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .empty-note { text-align: center; color: var(--muted); padding: 2.5rem 1rem; font-size: 1.2rem; }
  .tag { display: inline-block; background: #f1edff; color: var(--primary-d); border-radius: 999px; padding: .15rem .7rem; font-size: 1rem; }
  details summary { cursor: pointer; font-size: 1.02rem; color: var(--muted); }
  pre.plan { white-space: pre-wrap; font-family: inherit; background: #f7f5ff; padding: .8rem; border-radius: .8rem; font-size: 1rem; margin: .5rem 0 0; }

  /* ===== 여정 홈 내부 요소 (헤더/배지/카드) ===== */
  .home__head { display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; flex: none; }
  .mascot { font-size: clamp(2.2rem, 6.5vmin, 3.6rem); background: #ffe9c2; border-radius: 50%; width: clamp(3.4rem, 10vmin, 5.4rem); height: clamp(3.4rem, 10vmin, 5.4rem); display: flex; align-items: center; justify-content: center; box-shadow: var(--shadow); flex: none; }
  .home__hi { flex: 1; min-width: 8rem; }
  .home__title { font-size: 1.15rem; color: #bb8533; }
  .home__greet { font-size: clamp(1.3rem, 3.8vmin, 1.9rem); }
  .badges { display: flex; gap: .55rem; flex-wrap: wrap; }
  .badge { display: flex; align-items: center; gap: .35rem; background: #fff; border: .18rem solid #f0e3c4; border-radius: 999px; padding: .35rem .85rem; font-size: 1.02rem; }
  .badge .v { font-weight: 700; color: var(--primary-d); }
  .badge .l { color: var(--muted); font-size: .88rem; }
  .hub-row { flex: 1; min-height: 0; display: flex; align-items: stretch; justify-content: center; gap: .6rem; flex-wrap: wrap; }
  .hub-card { position: relative; flex: 1 1 13rem; max-width: 18rem; min-width: 10.5rem; display: flex; flex-direction: column; align-items: center; text-align: center; gap: .5rem; border-radius: 1.6rem; padding: 1.5rem 1rem 1.2rem; color: #fff; box-shadow: var(--shadow); }
  .hub-card.orange { background: linear-gradient(160deg, #ffa75f, #ff8330); }
  .hub-card.green  { background: linear-gradient(160deg, #46d39a, #1fb87d); }
  .hub-card.yellow { background: linear-gradient(160deg, #ffd45e, #ffb52a); }
  .hub-num { position: absolute; left: .8rem; top: .8rem; background: #fff; color: #5a4a2a; width: 1.9rem; height: 1.9rem; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.05rem; box-shadow: var(--shadow); }
  .hub-icon { font-size: clamp(2.6rem, 8vmin, 4rem); margin-top: .5rem; }
  .hub-title { font-size: 1.45rem; }
  .hub-sub { font-size: 1rem; opacity: .95; line-height: 1.35; }
  .hub-start { margin-top: auto; font-family: inherit; font-size: 1.15rem; font-weight: 700; border: none; cursor: pointer; background: #fff; color: #444; border-radius: 999px; padding: .6em 1.4em; box-shadow: 0 .3rem 0 rgba(0,0,0,.13); }
  .hub-start:active { transform: translateY(.2rem); box-shadow: 0 .1rem 0 rgba(0,0,0,.13); }

</head>
<body>
  <div class="stage">
    <div class="panel">
      <header id="topbar" class="topbar hidden">
        <button id="homeBtn" class="topbar__home" title="처음으로">🎬</button>
        <div id="stepDots" class="steps"></div>
        <div class="topbar__right">
          <span id="whoami" class="whoami"></span>
          <button id="boardBtn" class="pill-btn">🖼️ 친구 작품</button>
          <button id="settingsBtn" class="icon-btn" title="선생님 설정">⚙️</button>
        </div>
      </header>
      <main id="app" class="app"></main>
      <footer id="navbar" class="navbar"></footer>
    </div>
  </div>
  <div id="toast" class="toast hidden"></div>
  <div id="modalRoot"></div>
  <div id="loading" class="loading hidden"><div class="loading__spinner"></div><span id="loadingText">잠깐만요…</span></div>
  <script>
/* =========================================================
 *  우리 반 애니메이션 스튜디오 — 클라이언트 (1/2)
 *  페이지 넘김 구조 · 서버통신 · 입장 · 학습(2쪽) · 계획(2쪽)
 * ========================================================= */
window.S = window.S || {};
(function (S) {
  'use strict';

  /* ---------- 페이지 흐름 ---------- */
  S.STEPS = ['입장', '학습', '계획', '촬영', '평가', '보드'];
  S.FLOW = [
    { key: 'entry',    screen: 'entry',    step: 0 },
    { key: 'home',     screen: 'home',     step: 0 },
    { key: 'learn1',   screen: 'learn',    sub: 0, step: 1 },
    { key: 'learn2',   screen: 'learn',    sub: 1, step: 1 },
    { key: 'learn3',   screen: 'learn',    sub: 2, step: 1 },
    { key: 'learn4',   screen: 'learn',    sub: 3, step: 1 },
    { key: 'learn5',   screen: 'learn',    sub: 4, step: 1 },
    { key: 'plan1',    screen: 'plan',     sub: 0, step: 2 },
    { key: 'plan2',    screen: 'plan',     sub: 1, step: 2 },
    { key: 'capture',  screen: 'capture',  step: 3 },
    { key: 'selfeval', screen: 'selfeval', step: 4 },
    { key: 'board',    screen: 'board',    step: 5 }
  ];
  S.curIndex = 0;

  /* ---------- 상태 ---------- */
  S.state = {
    student: null,
    plan: { title: '', story: '', cells: ['', '', '', ''] },
    frames: [],
    fps: 6,
    screen: 'entry',
    sub: 0
  };

  /* =========================================================
   *  서버 통신 (google.script.run) — 없으면 모의(MOCK) 사용
   * ========================================================= */
  S.call = function (name) {
    var args = Array.prototype.slice.call(arguments, 1);
    if (window.google && google.script && google.script.run) {
      return new Promise(function (resolve, reject) {
        var runner = google.script.run.withSuccessHandler(resolve).withFailureHandler(function (e) { reject(e); });
        runner[name].apply(runner, args);
      });
    }
    if (typeof MOCK !== 'undefined' && MOCK[name]) {
      try { return Promise.resolve(MOCK[name].apply(null, args)); }
      catch (e) { return Promise.reject(e); }
    }
    return Promise.reject(new Error('서버 함수를 찾을 수 없어요: ' + name));
  };

  /* =========================================================
   *  도우미
   * ========================================================= */
  S.app = function () { return document.getElementById('app'); };
  S.esc = function (s) {
    return String(s == null ? '' : s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  };
  S.errText = function (e) { return (e && (e.message || e.toString())) || '알 수 없는 오류'; };

  S.toast = function (msg, ms) {
    var t = document.getElementById('toast');
    t.textContent = msg; t.classList.remove('hidden');
    clearTimeout(S._toastTimer);
    S._toastTimer = setTimeout(function () { t.classList.add('hidden'); }, ms || 2200);
  };
  S.loading = function (on, text) {
    if (text) document.getElementById('loadingText').textContent = text;
    document.getElementById('loading').classList.toggle('hidden', !on);
  };
  S.pushTimer = function (t) { (S._timers = S._timers || []).push(t); };

  /* ---------- 페이지 렌더 ---------- */
  S.page = function (body, opts) {
    opts = opts || {};
    var head = opts.head || (opts.title
      ? '<div class="page__head"><h1 class="page__title">' + opts.title + '</h1>' +
        (opts.sub ? '<p class="page__sub">' + opts.sub + '</p>' : '') + '</div>'
      : '');
    S.app().innerHTML = '<div class="page dir-' + (S._dir || 'next') + '">' +
      head + '<div class="page__body">' + body + '</div></div>';
  };

  /* ---------- 아래 이동 바 ---------- */
  S.setNav = function (cfg) {
    var nav = document.getElementById('navbar');
    cfg = cfg || {};
    if (!cfg.back && !cfg.next && !cfg.center) { nav.classList.add('hidden'); nav.innerHTML = ''; return; }
    nav.classList.remove('hidden');
    var left = cfg.back ? '<button class="btn ghost" id="navBack">' + cfg.back.label + '</button>' : '<span></span>';
    var center = '<div class="nav-center">' + (cfg.center || '') + '</div>';
    var right = cfg.next ? '<button class="btn ' + (cfg.next.cls || 'accent') + '" id="navNext"' + (cfg.next.disabled ? ' disabled' : '') + '>' + cfg.next.label + '</button>' : '<span></span>';
    nav.innerHTML = left + center + right;
    if (cfg.back) document.getElementById('navBack').onclick = cfg.back.fn;
    if (cfg.next) document.getElementById('navNext').onclick = cfg.next.fn;
  };
  S.setNextDisabled = function (b) { var n = document.getElementById('navNext'); if (n) n.disabled = b; };

  /* ---------- 상단 바 ---------- */
  S.renderTopbar = function (step) {
    var bar = document.getElementById('topbar');
    if (!S.state.student) { bar.classList.add('hidden'); return; }
    bar.classList.remove('hidden');
    document.getElementById('whoami').textContent = '👋 ' + S.state.student.name;
    document.getElementById('stepDots').innerHTML = S.STEPS.map(function (lbl, i) {
      var cls = 'step-dot' + (i === step ? ' active' : (i < step ? ' done' : ''));
      return '<span class="' + cls + '">' + (i < step ? '✓' : (i + 1)) + '<span class="lbl"> ' + lbl + '</span></span>';
    }).join('');
  };
  S.bindTopbar = function () {
    document.getElementById('homeBtn').onclick = function () { S.go(S.state.student ? 'home' : 'entry'); };
    document.getElementById('boardBtn').onclick = function () { S.go('board'); };
    document.getElementById('settingsBtn').onclick = function () { S.teacherSettings(); };
  };

  /* ---------- 이동 ---------- */
  S.gotoIndex = function (i, dir) {
    if (i < 0 || i >= S.FLOW.length) return;
    var f = S.FLOW[i];
    if (f.screen !== 'entry' && !S.state.student) { i = 0; f = S.FLOW[0]; }
    S.curIndex = i;
    S.state.screen = f.screen; S.state.sub = f.sub || 0;
    S._dir = dir || 'next';
    if (S.stopPlayers) S.stopPlayers();
    S.renderTopbar(f.step);
    window.scrollTo(0, 0);
    switch (f.screen) {
      case 'entry':    S.screenEntry(); break;
      case 'home':     S.screenHome(); break;
      case 'learn':    S.screenLearn(f.sub || 0); break;
      case 'plan':     S.screenPlan(f.sub || 0); break;
      case 'capture':  S.screenCapture(); break;
      case 'selfeval': S.screenSelfEval(); break;
      case 'board':    S.screenBoard(); break;
    }
  };
  S.next = function () { S.gotoIndex(S.curIndex + 1, 'next'); };
  S.prev = function () { S.gotoIndex(S.curIndex - 1, 'prev'); };
  S.gotoKey = function (key, dir) {
    for (var i = 0; i < S.FLOW.length; i++) if (S.FLOW[i].key === key) { S.gotoIndex(i, dir); return; }
  };
  S.go = function (screen) {
    for (var i = 0; i < S.FLOW.length; i++) if (S.FLOW[i].screen === screen) {
      S.gotoIndex(i, i >= S.curIndex ? 'next' : 'prev'); return;
    }
  };

  /* ---------- 이미지: 사진 → 작은 컷 ---------- */
  S.fileToFrame = function (file, maxW) {
    maxW = maxW || 480;
    return new Promise(function (resolve, reject) {
      var reader = new FileReader();
      reader.onload = function () { resolve(S.dataUrlToFrame(reader.result, maxW)); };
      reader.onerror = function () { reject(new Error('사진을 읽지 못했어요.')); };
      reader.readAsDataURL(file);
    });
  };
  S.dataUrlToFrame = function (dataUrl, maxW) {
    maxW = maxW || 480;
    return new Promise(function (resolve, reject) {
      var img = new Image();
      img.onload = function () {
        var scale = Math.min(1, maxW / img.width);
        var w = Math.round(img.width * scale), h = Math.round(img.height * scale);
        var cv = document.createElement('canvas'); cv.width = w; cv.height = h;
        cv.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(cv.toDataURL('image/jpeg', 0.55));
      };
      img.onerror = function () { reject(new Error('사진을 처리하지 못했어요.')); };
      img.src = dataUrl;
    });
  };
  S.makeThumb = function (dataUrl, size) {
    size = size || 150;
    return new Promise(function (resolve) {
      var img = new Image();
      img.onload = function () {
        var scale = size / Math.max(img.width, img.height);
        var w = Math.round(img.width * scale), h = Math.round(img.height * scale);
        var cv = document.createElement('canvas'); cv.width = w; cv.height = h;
        cv.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(cv.toDataURL('image/jpeg', 0.5));
      };
      img.onerror = function () { resolve(dataUrl); };
      img.src = dataUrl;
    });
  };

  /* =========================================================
   *  ① 입장
   * ========================================================= */
  S.screenEntry = function () {
    S.setNav({});
    S.loading(true, '명단을 불러오는 중…');
    S.call('apiGetRoster').then(function (roster) {
      S.loading(false);
      if (!roster || roster.length === 0) {
        S.page(
          '<div class="center-col"><div class="logo">🎬</div>' +
          '<div class="card" style="text-align:center;max-width:34rem;">' +
            '<p style="font-size:1.2rem;">아직 학생 명단이 없어요.<br>선생님께서 오른쪽 위 ⚙️ 를 눌러 명단을 등록해 주세요.</p>' +
            '<button class="btn" onclick="S.teacherSettings()">⚙️ 선생님 설정 열기</button>' +
          '</div></div>',
          { title: '우리 반 애니메이션 스튜디오' }
        );
        document.getElementById('topbar').classList.remove('hidden');
        document.getElementById('whoami').textContent = '';
        document.getElementById('stepDots').innerHTML = '';
        return;
      }
      var cards = roster.map(function (st) {
        return '<button class="name-card" data-id="' + S.esc(st.id) + '" data-name="' + S.esc(st.name) + '" data-num="' + S.esc(st.number) + '">' +
          '<span class="num">' + S.esc(st.number) + '번</span>' + S.esc(st.name) + '</button>';
      }).join('');
      S.page(
        '<div class="logo" style="text-align:center;">🎬</div>' +
        '<div class="scroll-area"><div class="roster-grid">' + cards + '</div></div>',
        { title: '내 이름을 눌러 입장해요!', sub: '명단에서 자기 이름을 찾아 누르세요' }
      );
      document.getElementById('topbar').classList.remove('hidden');
      document.getElementById('whoami').textContent = '';
      document.getElementById('stepDots').innerHTML = '';
      Array.prototype.forEach.call(document.querySelectorAll('.name-card'), function (b) {
        b.onclick = function () {
          S.state.student = { id: b.dataset.id, name: b.dataset.name, number: b.dataset.num };
          localStorage.setItem('anim_student', JSON.stringify(S.state.student));
          S.toast(S.state.student.name + '님, 환영해요! 🎉');
          S.gotoKey('home', 'next');
        };
      });
    }).catch(function (e) {
      S.loading(false);
      S.page('<div class="center-col"><div class="card"><h2>이런!</h2><p>' + S.esc(S.errText(e)) +
        '</p><button class="btn" onclick="S.go(\'entry\')">다시 시도</button></div></div>', { title: '문제가 생겼어요' });
    });
  };

  /* =========================================================
   *  여정 홈 (카드형 허브)
   * ========================================================= */
  S.screenHome = function () {
    S.setNav({});
    document.getElementById('stepDots').innerHTML = '';
    var name = S.state.student ? S.state.student.name : '친구';
    var render = function (works, hearts) {
      var medals = works > 0 ? 1 : 0;
      var head =
        '<div class="home__head">' +
          '<div class="mascot">🎬</div>' +
          '<div class="home__hi">' +
            '<div class="home__title">우리 반 애니메이션 스튜디오</div>' +
            '<div class="home__greet">안녕, <b>' + S.esc(name) + '</b> 감독님!</div>' +
          '</div>' +
          '<div class="badges">' +
            badge('🎬', '내 작품', works) + badge('❤️', '받은 하트', hearts) + badge('🏅', '메달', medals) +
          '</div>' +
        '</div>';
      S.page(
        '<div class="hub-row">' +
          hub(1, 'orange', '📚', '애니메이션 배우기', '원리와 만드는 법을 알아봐요', 'learn1') +
          '<div class="hub-arrow">→</div>' +
          hub(2, 'green', '🎥', '나만의 애니 만들기', '계획하고 사진 찍어 영상으로!', 'plan1') +
          '<div class="hub-arrow">→</div>' +
          hub(3, 'yellow', '🖼️', '친구 작품 보드', '감상하고 하트·댓글로 응원해요', 'board') +
        '</div>' +
        '<div class="home__hint">💡 1 → 2 차례로 만들고, 3 보드에서 친구들과 작품을 함께 봐요!</div>',
        { head: head }
      );
      Array.prototype.forEach.call(document.querySelectorAll('.hub-start'), function (b) {
        b.onclick = function () { S.gotoKey(b.dataset.go, 'next'); };
      });
    };
    render(0, 0);
    S.call('apiListAnimations').then(function (list) {
      var mine = (list || []).filter(function (a) { return S.state.student && a.studentId === S.state.student.id; });
      var hearts = mine.reduce(function (s, a) { return s + (a.hearts || 0); }, 0);
      if (S.state.screen === 'home') render(mine.length, hearts);
    }).catch(function () {});

    function badge(ic, label, val) {
      return '<div class="badge">' + ic + ' <span class="v">' + val + '</span><span class="l">' + label + '</span></div>';
    }
    function hub(n, color, icon, title, sub, go) {
      return '<div class="hub-card ' + color + '"><span class="hub-num">' + n + '</span>' +
        '<div class="hub-icon">' + icon + '</div><div class="hub-title">' + title + '</div>' +
        '<div class="hub-sub">' + sub + '</div>' +
        '<button class="hub-start" data-go="' + go + '">시작하기 →</button></div>';
    }
  };

  /* =========================================================
   *  ② 학습 (설명 4쪽 + 플립 4단계 1쪽 = 5쪽)
   * ========================================================= */
  S.LEARN_FACTS = [
    { emoji: '👁️', title: '① 잔상 효과', paras: [
        '우리 눈은 한 번 본 그림을 약 <b>1/16초</b> 동안 기억해요. 이것을 <b>잔상 효과</b>라고 해요.',
        '그래서 조금씩 다른 그림을 빠르게 이어서 보여주면, 눈이 그 사이를 스스로 메워서 <b>“움직인다”</b>고 느껴요.',
        '옛날에는 새와 새장을 동전 양면에 그려 빙글빙글 돌렸더니, 새가 새장 안에 들어간 것처럼 보였대요. (소마트로프)'
      ], tip: '애니메이션은 마술이 아니라, 우리 눈의 성질을 똑똑하게 이용한 거예요!' },
    { emoji: '🖼️', title: '② 컷(프레임)', paras: [
        '애니메이션은 사진(그림) <b>여러 장</b>으로 만들어져요. 그 한 장 한 장을 <b>컷</b> 또는 <b>프레임</b>이라고 불러요.',
        '각 컷은 바로 앞 컷과 <b>아주 조금만</b> 달라야 해요. 많이 달라지면 화면이 뚝뚝 끊겨 보여요.',
        '예를 들어 팔을 드는 장면이라면, 팔을 조금씩 위로 올린 컷을 여러 장 찍으면 돼요.'
      ], tip: '“조금씩, 여러 장”이 가장 중요한 비밀이에요.' },
    { emoji: '⚡', title: '③ 속도 (컷/초)', paras: [
        '1초에 컷을 <b>몇 장</b> 보여줄지를 <b>fps(초당 프레임 수)</b>라고 해요.',
        '컷이 많을수록(빠를수록) 더 <b>부드럽게</b>, 적을수록 <b>통통 튀는</b> 느낌이 나요.',
        '우리 앱에서는 🐢~🐇 막대로 1초에 <b>2~15장</b>까지 정할 수 있어요. 보통 <b>6~8장</b>이면 좋아요.'
      ], tip: '같은 사진이라도 속도를 바꾸면 느낌이 확 달라져요.' },
    { emoji: '📒', title: '④ 플립북', paras: [
        '공책 귀퉁이마다 조금씩 다른 그림을 그리고 <b>촤르륵</b> 넘기면 그림이 움직여요. 이것이 <b>플립북</b>이에요.',
        '우리는 그림 대신 <b>사진</b>을 찍어서 “디지털 플립북”을 만들 거예요.',
        '인형·블록·점토·종이 그림을 <b>조금씩 움직이며</b> 한 컷씩 사진을 찍으면 멋진 애니메이션이 완성돼요!'
      ], tip: '다음 쪽에서 우리가 만들 4단계를 살펴봐요 →' }
  ];

  S.screenLearn = function (sub) {
    var TOTAL = 5;
    if (sub < 4) {
      var f = S.LEARN_FACTS[sub];
      S.page(
        '<div class="fact-page">' +
          '<div class="fact-visual"><div class="fact-emoji">' + f.emoji + '</div></div>' +
          '<div class="fact-text">' +
            f.paras.map(function (p) { return '<p>' + p + '</p>'; }).join('') +
            '<div class="fact-tip">💡 ' + f.tip + '</div>' +
          '</div>' +
        '</div>',
        { title: f.title + ' ' + f.emoji }
      );
      S.setNav({
        back: sub === 0 ? { label: '🏠 홈', fn: function () { S.go('home'); } } : { label: '◀ 이전', fn: S.prev },
        center: (sub + 1) + ' / ' + TOTAL,
        next: { label: '다음 ▶', fn: S.next }
      });
    } else {
      S.page(
        '<div class="flip-layout">' +
          '<div class="flip-left">' +
            '<div id="flipStage" class="flip-stage">🙂</div>' +
            '<button class="btn" id="playFlip">▶ 움직임 미리보기</button>' +
          '</div>' +
          '<div class="flip-right"><ol class="toc">' +
            step(1, '📝', '계획 세우기', '이야기를 정하고 컷을 나눠요') +
            step(2, '📸', '사진 찍기', '조금씩 움직이며 한 컷씩 찍어요') +
            step(3, '🎞️', '컷 이어붙이기', '순서대로 놓고 속도를 정해요') +
            step(4, '🖼️', '함께 감상', '보드에 올려 친구들과 봐요') +
          '</ol></div>' +
        '</div>',
        { title: '플립 애니메이션 4단계 🎞️' }
      );
      var faces = ['🙂', '😊', '😄', '😁', '😆', '😄', '😊', '🙂'];
      var stage = document.getElementById('flipStage');
      var fi = 0, timer = null;
      document.getElementById('playFlip').onclick = function () {
        if (timer) { clearInterval(timer); timer = null; this.textContent = '▶ 움직임 미리보기'; return; }
        this.textContent = '⏸ 멈추기';
        timer = setInterval(function () { fi = (fi + 1) % faces.length; stage.textContent = faces[fi]; }, 150);
        S.pushTimer(timer);
      };
      Array.prototype.forEach.call(document.querySelectorAll('.toc li'), function (li) {
        li.onclick = function () {
          Array.prototype.forEach.call(document.querySelectorAll('.toc li'), function (x) { x.classList.remove('active'); });
          li.classList.add('active');
          stage.textContent = li.dataset.emoji;
        };
      });
      S.setNav({
        back: { label: '◀ 이전', fn: S.prev },
        center: '5 / ' + TOTAL,
        next: { label: '내 계획 세우기 ▶', fn: S.next }
      });
    }

    function step(n, emoji, title, desc) {
      return '<li data-emoji="' + emoji + '"><span class="n">' + n + '</span>' +
        '<span class="toc-txt"><span class="t">' + emoji + ' ' + title + '</span>' +
        '<span class="d">' + desc + '</span></span></li>';
    }
  };

  /* =========================================================
   *  ③ 계획 (2쪽)
   * ========================================================= */
  S.screenPlan = function (sub) {
    var p = S.state.plan;
    if (sub === 0) {
      S.page(
        '<div class="center-col" style="justify-content:flex-start;">' +
          '<div class="card" style="width:100%;max-width:40rem;">' +
            '<label class="field">🎬 작품 제목</label>' +
            '<input type="text" id="planTitle" maxlength="40" placeholder="예) 점프하는 우리 강아지" value="' + S.esc(p.title) + '">' +
            '<label class="field">📖 어떤 이야기인가요? (무엇이 어떻게 움직이나요)</label>' +
            '<textarea id="planStory" rows="4" maxlength="300" placeholder="예) 강아지가 앉아 있다가 점점 일어나 폴짝 뛴다.">' + S.esc(p.story) + '</textarea>' +
          '</div>' +
        '</div>',
        { title: '애니메이션 계획 📝', sub: '제목과 이야기를 정해요' }
      );
      document.getElementById('planTitle').oninput = function () { p.title = this.value; };
      document.getElementById('planStory').oninput = function () { p.story = this.value; };
      S.setNav({
        back: { label: '◀ 이전', fn: S.prev },
        center: '1 / 2 쪽',
        next: { label: '컷 짜기 ▶', fn: function () {
          p.title = (document.getElementById('planTitle').value || '').trim();
          p.story = (document.getElementById('planStory').value || '').trim();
          if (!p.title) { S.toast('작품 제목을 먼저 정해주세요 🙂'); document.getElementById('planTitle').focus(); return; }
          S.next();
        } }
      });
    } else {
      if (!p.cells.length) p.cells = ['', '', '', ''];
      S.page(
        '<div class="scroll-area"><div class="storyboard" id="sbGrid"></div>' +
          '<div class="btn-row" style="margin-top:.8rem;justify-content:center;">' +
            '<button class="btn ghost" id="addCell">➕ 컷 추가</button>' +
            '<span class="page__sub" id="cellCount"></span>' +
          '</div></div>',
        { title: '컷 계획 (스토리보드) 🗂️', sub: '컷마다 어떤 장면을 찍을지 적어요' }
      );
      drawCells();
      document.getElementById('addCell').onclick = function () { p.cells.push(''); drawCells(); };
      S.setNav({
        back: { label: '◀ 이전', fn: S.prev },
        center: '2 / 2 쪽',
        next: { label: '촬영하러 가기 📸', fn: S.next }
      });
    }

    function drawCells() {
      var grid = document.getElementById('sbGrid');
      grid.innerHTML = p.cells.map(function (c, i) {
        return '<div class="sb-cell"><div class="sb-num"><span>컷 ' + (i + 1) + '</span>' +
          (p.cells.length > 1 ? '<button class="del" data-del="' + i + '">✕ 삭제</button>' : '') + '</div>' +
          '<textarea data-cell="' + i + '" rows="3" maxlength="120" placeholder="이 컷의 장면">' + S.esc(c) + '</textarea></div>';
      }).join('');
      document.getElementById('cellCount').textContent = '계획한 컷: ' + p.cells.length + '개';
      Array.prototype.forEach.call(grid.querySelectorAll('textarea'), function (ta) {
        ta.oninput = function () { p.cells[parseInt(ta.dataset.cell, 10)] = ta.value; };
      });
      Array.prototype.forEach.call(grid.querySelectorAll('[data-del]'), function (b) {
        b.onclick = function () { p.cells.splice(parseInt(b.dataset.del, 10), 1); drawCells(); };
      });
    }
  };

  /* ---------- 부팅 공통 ---------- */
  S.bootCommon = function () {
    var saved = localStorage.getItem('anim_student');
    if (saved) { try { S.state.student = JSON.parse(saved); } catch (e) {} }
    S.bindTopbar();
  };

})(window.S);
</script>

  <script>
/* =========================================================
 *  우리 반 애니메이션 스튜디오 — 클라이언트 (2/2)
 *  촬영 · 자기평가 · 보드 · 감상 · 선생님 설정 · 미리보기 모의데이터
 * ========================================================= */
(function (S) {
  'use strict';

  /* ---------- 영상 재생기 ---------- */
  S._timers = [];
  S._stream = null;
  S.stopPlayers = function () {
    (S._timers || []).forEach(function (t) { clearInterval(t); });
    S._timers = [];
    if (S._stream) { S._stream.getTracks().forEach(function (tr) { tr.stop(); }); S._stream = null; }
  };
  S.stopPlayersKeepCamera = function () {
    (S._timers || []).forEach(function (t) { clearInterval(t); });
    S._timers = [];
  };
  function fit(ctx, cv, img) {
    ctx.fillStyle = '#000'; ctx.fillRect(0, 0, cv.width, cv.height);
    if (!img || !img.width) return;
    var s = Math.min(cv.width / img.width, cv.height / img.height);
    var w = img.width * s, h = img.height * s;
    ctx.drawImage(img, (cv.width - w) / 2, (cv.height - h) / 2, w, h);
  }
  S.playOn = function (canvas, frames, fps) {
    if (!canvas || !frames || !frames.length) return;
    canvas.width = 480; canvas.height = 360;
    var ctx = canvas.getContext('2d');
    var imgs = frames.map(function (src) { var im = new Image(); im.src = src; return im; });
    var i = 0;
    var tick = function () { fit(ctx, canvas, imgs[i]); i = (i + 1) % imgs.length; };
    tick();
    S.pushTimer(setInterval(tick, 1000 / Math.max(1, fps)));
  };

  function renderStars(node, value, onset) {
    if (!node) return;
    function paint() {
      node.innerHTML = '';
      for (var s = 1; s <= 5; s++) {
        var sp = document.createElement('span');
        sp.className = 'star' + (s <= value ? ' on' : '');
        sp.textContent = '★';
        (function (n) { sp.onclick = function () { value = n; onset(n); paint(); }; })(s);
        node.appendChild(sp);
      }
    }
    paint();
  }

  /* =========================================================
   *  ④ 촬영 스튜디오 (촬영 / 미리보기 탭)
   * ========================================================= */
  S.screenCapture = function () {
    S.page(
      '<div class="tabbar">' +
        '<button class="tab active" data-tab="shoot">📸 촬영</button>' +
        '<button class="tab" data-tab="preview">▶ 미리보기</button>' +
      '</div>' +
      '<div class="cap-wrap" id="capShoot">' +
        '<div class="capture-box">' +
          '<video id="cam" autoplay playsinline muted></video>' +
          '<img id="onion" class="onion hidden" alt="">' +
          '<div id="capEmpty" class="capture-empty hidden">📷 아래 “사진 찍기”로<br>카메라를 열어 촬영하세요</div>' +
        '</div>' +
        '<div class="btn-row" style="justify-content:center;flex:none;gap:.5rem;">' +
          '<button class="btn green sm" id="shotBtn">📸 찰칵!</button>' +
          '<label class="btn ghost sm">🖼️ 가져오기' +
            '<input type="file" id="fileInput" accept="image/*" capture="environment" multiple class="hidden">' +
          '</label>' +
        '</div>' +
      '</div>' +
      '<div class="cap-wrap hidden" id="capPreview">' +
        '<canvas id="preview" class="player-canvas"></canvas>' +
        '<div class="speed-row"><span>🐢</span><input type="range" id="fps" min="2" max="15" step="1" value="' + S.state.fps + '">' +
          '<span>🐇</span><b id="fpsVal" style="font-size:1.1rem;min-width:5rem;text-align:right;">' + S.state.fps + ' 컷/초</b></div>' +
      '</div>' +
      '<div class="frames-strip" id="strip"></div>',
      { title: '사진 찍어 영상 만들기 📸' }
    );

    S._capTab = 'shoot';
    Array.prototype.forEach.call(document.querySelectorAll('.tab'), function (t) {
      t.onclick = function () { S.captureTab(t.dataset.tab); };
    });

    S.initCamera();
    S.drawFrames();

    document.getElementById('shotBtn').onclick = S.shoot;
    document.getElementById('fileInput').onchange = function (e) {
      var files = Array.prototype.slice.call(e.target.files || []);
      if (!files.length) return;
      S.loading(true, '사진을 넣는 중…');
      files.reduce(function (chain, f) {
        return chain.then(function () { return S.fileToFrame(f).then(function (fr) { S.state.frames.push(fr); }); });
      }, Promise.resolve()).then(function () {
        S.loading(false); S.afterFrameChange(); S.toast('컷 ' + files.length + '장 추가! 📥'); e.target.value = '';
      }).catch(function (err) { S.loading(false); S.toast(S.errText(err)); });
    };
    document.getElementById('fps').oninput = function () {
      S.state.fps = parseInt(this.value, 10);
      document.getElementById('fpsVal').textContent = S.state.fps + ' 컷/초';
      if (S._capTab === 'preview') S.refreshPreview();
    };

    S.updateCaptureNav();
  };

  S.updateCaptureNav = function () {
    var enough = S.state.frames.length >= 2;
    S.setNav({
      back: { label: '◀ 계획', fn: S.prev },
      center: '찍은 컷 ' + S.state.frames.length + '개',
      next: { label: '자기평가 ▶', cls: 'accent', disabled: !enough, fn: function () {
        if (S.state.frames.length < 2) { S.toast('컷이 2장 이상 있어야 영상이 돼요 🙂'); return; }
        S.next();
      } }
    });
  };

  S.captureTab = function (name) {
    S._capTab = name;
    Array.prototype.forEach.call(document.querySelectorAll('.tab'), function (t) {
      t.classList.toggle('active', t.dataset.tab === name);
    });
    document.getElementById('capShoot').classList.toggle('hidden', name !== 'shoot');
    document.getElementById('capPreview').classList.toggle('hidden', name !== 'preview');
    if (name === 'preview') S.refreshPreview(); else S.stopPlayersKeepCamera();
  };

  S.initCamera = function () {
    var video = document.getElementById('cam');
    var empty = document.getElementById('capEmpty');
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
      video.classList.add('hidden'); empty.classList.remove('hidden'); return;
    }
    navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' }, audio: false })
      .then(function (stream) {
        S._stream = stream; video.srcObject = stream; video.classList.remove('hidden'); empty.classList.add('hidden');
      })
      .catch(function () {
        video.classList.add('hidden'); empty.classList.remove('hidden');
      });
  };

  S.shoot = function () {
    var video = document.getElementById('cam');
    if (!S._stream || !video.videoWidth) { document.getElementById('fileInput').click(); return; }
    var cv = document.createElement('canvas');
    cv.width = video.videoWidth; cv.height = video.videoHeight;
    cv.getContext('2d').drawImage(video, 0, 0);
    S.dataUrlToFrame(cv.toDataURL('image/jpeg', 0.8)).then(function (fr) {
      S.state.frames.push(fr); S.afterFrameChange(); S.toast('찰칵! 📸 (' + S.state.frames.length + '컷)');
    });
  };

  S.afterFrameChange = function () {
    S.drawFrames();
    S.updateCaptureNav();
    if (S._capTab === 'preview') S.refreshPreview();
    var onion = document.getElementById('onion');
    if (onion && S.state.frames.length) {
      onion.src = S.state.frames[S.state.frames.length - 1];
      onion.classList.toggle('hidden', !S._stream);
    }
  };

  S.drawFrames = function () {
    var strip = document.getElementById('strip');
    if (!strip) return;
    var fr = S.state.frames;
    if (!fr.length) { strip.innerHTML = '<div class="capture-empty" style="color:#aaa;align-self:center;">아직 찍은 컷이 없어요</div>'; return; }
    strip.innerHTML = fr.map(function (src, i) {
      return '<div class="frame-thumb"><span class="idx">' + (i + 1) + '</span><img src="' + src + '">' +
        '<button class="del" data-del="' + i + '">✕</button>' +
        '<button class="mv l" data-mv="' + i + '" data-dir="-1">◀</button>' +
        '<button class="mv r" data-mv="' + i + '" data-dir="1">▶</button></div>';
    }).join('');
    Array.prototype.forEach.call(strip.querySelectorAll('[data-del]'), function (b) {
      b.onclick = function () { S.state.frames.splice(parseInt(b.dataset.del, 10), 1); S.afterFrameChange(); };
    });
    Array.prototype.forEach.call(strip.querySelectorAll('[data-mv]'), function (b) {
      b.onclick = function () {
        var i = parseInt(b.dataset.mv, 10), j = i + parseInt(b.dataset.dir, 10);
        if (j < 0 || j >= S.state.frames.length) return;
        var a = S.state.frames, tmp = a[i]; a[i] = a[j]; a[j] = tmp; S.afterFrameChange();
      };
    });
  };

  S.refreshPreview = function () {
    S.stopPlayersKeepCamera();
    var cv = document.getElementById('preview');
    if (!cv) return;
    if (S.state.frames.length) S.playOn(cv, S.state.frames, S.state.fps);
    else { cv.width = 480; cv.height = 360; var c = cv.getContext('2d'); c.fillStyle = '#222'; c.fillRect(0, 0, 480, 360); c.fillStyle = '#fff'; c.font = '24px Jua'; c.textAlign = 'center'; c.fillText('컷을 찍으면 여기서 움직여요', 240, 185); }
  };

  /* =========================================================
   *  ⑤ 자기평가
   * ========================================================= */
  S.CHECKS = [
    '계획한 이야기가 영상에 잘 나타나요.',
    '컷이 2장 이상이고, 순서가 자연스러워요.',
    '제목을 알맞게 정했어요.',
    '친구가 보기에 불편한 내용은 없어요.'
  ];
  S.SELF_STARS = [
    { key: 'creative', label: '🎨 창의성' },
    { key: 'motion', label: '🏃 움직임' },
    { key: 'effort', label: '💪 노력' }
  ];

  S.screenSelfEval = function () {
    if (S.state.frames.length < 2) { S.toast('먼저 컷을 2장 이상 찍어주세요'); S.go('capture'); return; }
    S._selfChecks = S._selfChecks || S.CHECKS.map(function () { return false; });
    S._selfStars = S._selfStars || { creative: 0, motion: 0, effort: 0 };

    S.page(
      '<div class="eval-layout">' +
        '<div class="eval-left">' +
          '<canvas id="evalPreview" class="player-canvas"></canvas>' +
          '<p class="page__sub" style="margin:0;">제목: <b>' + S.esc(S.state.plan.title) + '</b> · ' + S.state.frames.length + '컷</p>' +
        '</div>' +
        '<div class="eval-right">' +
          '<h3>올리기 전에 스스로 확인해요 ✅</h3>' +
          '<div id="checkList"></div>' +
          '<h3 style="margin-top:.5rem;">⭐ 스스로 별점</h3>' +
          '<div id="selfStars"></div>' +
        '</div>' +
      '</div>',
      { title: '자기평가 ✅' }
    );

    S.playOn(document.getElementById('evalPreview'), S.state.frames, S.state.fps);

    var cl = document.getElementById('checkList');
    cl.innerHTML = S.CHECKS.map(function (c, i) {
      return '<label class="check-item' + (S._selfChecks[i] ? ' checked' : '') + '" data-ci="' + i + '" style="margin-bottom:.5rem;">' +
        '<input type="checkbox" ' + (S._selfChecks[i] ? 'checked' : '') + '><span>' + S.esc(c) + '</span></label>';
    }).join('');
    Array.prototype.forEach.call(cl.querySelectorAll('.check-item'), function (lab) {
      lab.querySelector('input').onchange = function () {
        S._selfChecks[parseInt(lab.dataset.ci, 10)] = this.checked;
        lab.classList.toggle('checked', this.checked);
        S.setNextDisabled(!S._selfChecks.every(Boolean));
      };
    });

    var ss = document.getElementById('selfStars');
    ss.innerHTML = S.SELF_STARS.map(function (row) {
      return '<div class="peer-row"><span>' + row.label + '</span><span class="stars" data-k="' + row.key + '"></span></div>';
    }).join('');
    S.SELF_STARS.forEach(function (row) {
      renderStars(ss.querySelector('[data-k="' + row.key + '"]'), S._selfStars[row.key], function (v) { S._selfStars[row.key] = v; });
    });

    S.setNav({
      back: { label: '◀ 더 찍기', fn: S.prev },
      center: '확인 후 올려요',
      next: { label: '🚀 보드에 올리기', cls: 'green', disabled: !S._selfChecks.every(Boolean), fn: S.publish }
    });
  };

  S.publish = function () {
    var st = S.state;
    S.loading(true, '영상을 올리는 중…');
    S.makeThumb(st.frames[0], 150).then(function (thumb) {
      var planText = '[이야기] ' + (st.plan.story || '') + '\n[컷 계획]\n' +
        (st.plan.cells || []).map(function (c, i) { return (i + 1) + '. ' + (c || '-'); }).join('\n');
      return S.call('apiSaveAnimation', {
        studentId: st.student.id, studentName: st.student.name,
        title: st.plan.title || '제목 없음', plan: planText,
        fps: st.fps, frames: st.frames, thumbnail: thumb,
        selfEval: { checks: S._selfChecks, stars: S._selfStars }
      });
    }).then(function () {
      S.loading(false); S.toast('🎉 보드에 올렸어요! 친구들과 함께 봐요');
      S._selfChecks = null; S._selfStars = null;
      S.go('board');
    }).catch(function (e) { S.loading(false); S.toast(S.errText(e)); });
  };

  S.resetWork = function () {
    S.state.plan = { title: '', story: '', cells: ['', '', '', ''] };
    S.state.frames = []; S.state.fps = 6;
    S._selfChecks = null; S._selfStars = null;
    S.gotoKey('plan1', 'next');
  };

  /* =========================================================
   *  ⑥ 보드 (하트 많은 순)
   * ========================================================= */
  S.screenBoard = function () {
    S.setNav({});
    S.page(
      '<div class="btn-row" style="justify-content:space-between;flex:none;">' +
        '<span class="tag">❤️ 하트 많은 순</span>' +
        '<div class="btn-row">' +
          '<button class="btn ghost" id="refreshBtn">🔄 새로고침</button>' +
          '<button class="btn accent" id="newWorkBtn">➕ 새 작품</button>' +
        '</div>' +
      '</div>' +
      '<div class="scroll-area"><div id="boardGrid" class="board-grid"></div></div>',
      { title: '친구들 작품 보드 🖼️', sub: '눌러서 감상하고 ❤️·⭐·💬 로 응원해요!' }
    );
    document.getElementById('refreshBtn').onclick = function () { S.loadBoard(true); };
    document.getElementById('newWorkBtn').onclick = S.resetWork;
    S.loadBoard(true);
    S.pushTimer(setInterval(function () {
      if (S.state.screen === 'board' && !document.getElementById('modalRoot').innerHTML) S.loadBoard(false);
    }, 8000));
  };

  S.loadBoard = function (showSpin) {
    if (showSpin) S.loading(true, '작품을 불러오는 중…');
    S.call('apiListAnimations').then(function (list) {
      S.loading(false);
      var grid = document.getElementById('boardGrid');
      if (!grid) return;
      if (!list.length) {
        grid.innerHTML = '<div class="empty-note">아직 올라온 작품이 없어요.<br>첫 번째 주인공이 되어 보세요! 🌟</div>'; return;
      }
      var medal = ['🥇', '🥈', '🥉'];
      grid.innerHTML = list.map(function (a, i) {
        var rank = i < 3 ? '<span class="rank">' + medal[i] + ' ' + (i + 1) + '위</span>' : '';
        var thumb = a.thumbnail ? '<img class="thumb" src="' + a.thumbnail + '">' : '<div class="thumb"></div>';
        return '<div class="vid-card" data-id="' + S.esc(a.id) + '">' + rank + thumb +
          '<div class="meta"><h3>' + (i === 0 ? '👑 ' : '') + S.esc(a.title) + '</h3>' +
          '<div class="by">' + S.esc(a.studentName) + ' · ' + a.frameCount + '컷</div>' +
          '<div class="heart-line">❤️ ' + a.hearts + '</div></div></div>';
      }).join('');
      Array.prototype.forEach.call(grid.querySelectorAll('.vid-card'), function (c) {
        c.onclick = function () { S.watch(c.dataset.id); };
      });
    }).catch(function (e) { S.loading(false); S.toast(S.errText(e)); });
  };

  /* =========================================================
   *  감상 + 하트 + 동료평가 + 댓글
   * ========================================================= */
  S.PEER = [
    { key: 'story', label: '📖 이야기가 잘 보여요' },
    { key: 'motion', label: '🏃 움직임이 자연스러워요' },
    { key: 'creative', label: '🎨 기발하고 창의적이에요' }
  ];

  S.modal = function (innerHTML) {
    var root = document.getElementById('modalRoot');
    root.innerHTML = '<div class="modal-back" id="mback"><div class="modal"><div class="modal__body">' +
      '<button class="modal__close" id="mclose">✕</button>' + innerHTML + '</div></div></div>';
    var close = function () { S.stopPlayersKeepCamera(); root.innerHTML = ''; if (S._onModalClose) { var f = S._onModalClose; S._onModalClose = null; f(); } };
    document.getElementById('mclose').onclick = close;
    document.getElementById('mback').onclick = function (e) { if (e.target.id === 'mback') close(); };
  };
  S.closeModal = function () { document.getElementById('modalRoot').innerHTML = ''; };

  S.watch = function (animId) {
    S.loading(true, '영상을 여는 중…');
    S.call('apiGetAnimationDetail', animId, S.state.student.id).then(function (d) {
      S.loading(false);
      S._onModalClose = function () { S.loadBoard(false); };
      S.modal(
        '<div class="watch-grid">' +
          '<div>' +
            '<h2 style="margin:0 0 .2rem;">' + S.esc(d.meta.title) + '</h2>' +
            '<div class="by" style="color:#7a7596;margin-bottom:.5rem;">만든이: ' + S.esc(d.meta.studentName) + '</div>' +
            '<canvas id="watchCanvas" class="watch-canvas"></canvas>' +
            '<details style="margin-top:.6rem;"><summary>📖 만든이의 계획 보기</summary><pre class="plan">' + S.esc(d.meta.plan) + '</pre></details>' +
          '</div>' +
          '<div>' +
            '<div class="card" style="box-shadow:none;border:.15rem solid #f0ecfb;margin-bottom:.7rem;display:flex;align-items:center;gap:.6rem;">' +
              '<button class="heart-btn" id="heartBtn">' + (d.hearted ? '❤️' : '🤍') + '</button>' +
              '<b id="heartCount" style="font-size:1.5rem;color:#ff4d6d;">' + d.hearts + '</b>' +
              '<span class="page__sub" style="margin:0;">하트로 응원!</span>' +
            '</div>' +
            '<div class="card" style="box-shadow:none;border:.15rem solid #f0ecfb;margin-bottom:.7rem;">' +
              '<h3>⭐ 동료평가</h3><div id="peerStars"></div>' +
              '<button class="btn green" id="peerSave" style="margin-top:.5rem;font-size:1rem;">평가 저장</button>' +
              '<p class="page__sub" id="peerSummary" style="margin:.5rem 0 0;"></p>' +
            '</div>' +
            '<div class="card" style="box-shadow:none;border:.15rem solid #f0ecfb;">' +
              '<h3>💬 댓글</h3><div class="comment-list" id="commentList"></div>' +
              '<div class="btn-row" style="margin-top:.5rem;flex-wrap:nowrap;">' +
                '<input type="text" id="commentInput" maxlength="200" placeholder="따뜻한 한마디 ✍️">' +
                '<button class="btn" id="commentSend" style="font-size:1rem;">등록</button>' +
              '</div>' +
            '</div>' +
          '</div>' +
        '</div>'
      );

      S.playOn(document.getElementById('watchCanvas'), d.frames, d.fps);

      var heartBtn = document.getElementById('heartBtn');
      heartBtn.onclick = function () {
        heartBtn.disabled = true;
        S.call('apiToggleHeart', animId, S.state.student.id).then(function (r) {
          heartBtn.disabled = false; heartBtn.textContent = r.hearted ? '❤️' : '🤍';
          document.getElementById('heartCount').textContent = r.hearts;
          if (r.hearted) S.toast('하트를 보냈어요 ❤️');
        }).catch(function (e) { heartBtn.disabled = false; S.toast(S.errText(e)); });
      };

      var my = d.myPeerEval || {};
      var peerVals = { story: my.story || 0, motion: my.motion || 0, creative: my.creative || 0 };
      var ps = document.getElementById('peerStars');
      ps.innerHTML = S.PEER.map(function (row) {
        return '<div class="peer-row"><span>' + row.label + '</span><span class="stars" data-k="' + row.key + '"></span></div>';
      }).join('');
      S.PEER.forEach(function (row) {
        renderStars(ps.querySelector('[data-k="' + row.key + '"]'), peerVals[row.key], function (v) { peerVals[row.key] = v; });
      });
      function showPeer(sum) {
        document.getElementById('peerSummary').textContent = (!sum || !sum.count)
          ? '아직 평가가 없어요. 첫 평가를 남겨보세요!'
          : '친구 ' + sum.count + '명 평균 → 이야기 ' + sum.avg.story + ' · 움직임 ' + sum.avg.motion + ' · 창의 ' + sum.avg.creative;
      }
      showPeer(d.peerSummary);
      document.getElementById('peerSave').onclick = function () {
        if (!peerVals.story && !peerVals.motion && !peerVals.creative) { S.toast('별점을 한 개 이상 눌러주세요 ⭐'); return; }
        S.call('apiAddPeerEval', animId, S.state.student.id, S.state.student.name, peerVals).then(function () {
          S.toast('평가를 저장했어요 ⭐');
          return S.call('apiGetAnimationDetail', animId, S.state.student.id);
        }).then(function (nd) { showPeer(nd.peerSummary); }).catch(function (e) { S.toast(S.errText(e)); });
      };

      S.renderComments(d.comments);
      var input = document.getElementById('commentInput');
      var send = function () {
        var text = (input.value || '').trim();
        if (!text) return;
        document.getElementById('commentSend').disabled = true;
        S.call('apiAddComment', animId, S.state.student.id, S.state.student.name, text).then(function (c) {
          input.value = ''; document.getElementById('commentSend').disabled = false;
          d.comments = d.comments.concat([c]); S.renderComments(d.comments);
        }).catch(function (e) { document.getElementById('commentSend').disabled = false; S.toast(S.errText(e)); });
      };
      document.getElementById('commentSend').onclick = send;
      input.onkeydown = function (e) { if (e.key === 'Enter') send(); };
    }).catch(function (e) { S.loading(false); S.toast(S.errText(e)); });
  };

  S.renderComments = function (comments) {
    var box = document.getElementById('commentList');
    if (!box) return;
    if (!comments.length) { box.innerHTML = '<p class="page__sub" style="margin:0;">아직 댓글이 없어요. 첫 댓글을 남겨보세요!</p>'; return; }
    box.innerHTML = comments.map(function (c) {
      return '<div class="comment"><span class="who">' + S.esc(c.studentName) + '</span> ' + S.esc(c.text) + '</div>';
    }).join('');
    box.scrollTop = box.scrollHeight;
  };

  /* =========================================================
   *  선생님 설정
   * ========================================================= */
  S.teacherSettings = function () {
    S.modal(
      '<h2>⚙️ 선생님 설정</h2>' +
      '<p class="page__sub">선생님 비밀번호를 입력하세요. (처음: 1234)</p>' +
      '<input type="password" id="pinInput" placeholder="비밀번호" style="max-width:16rem;">' +
      '<div class="btn-row" style="margin-top:.7rem;"><button class="btn" id="pinOk">들어가기</button></div>'
    );
    var go = function () {
      S.call('apiVerifyPin', document.getElementById('pinInput').value).then(function (ok) {
        if (!ok) { S.toast('비밀번호가 맞지 않아요'); return; }
        S._pin = document.getElementById('pinInput').value; S.teacherPanel();
      }).catch(function (e) { S.toast(S.errText(e)); });
    };
    document.getElementById('pinOk').onclick = go;
    document.getElementById('pinInput').onkeydown = function (e) { if (e.key === 'Enter') go(); };
  };

  S.teacherPanel = function () {
    S.call('apiGetRoster').then(function (roster) {
      var text = roster.map(function (r) { return r.number + ',' + r.name; }).join('\n');
      S.modal(
        '<h2>⚙️ 선생님 설정</h2>' +
        '<div class="card" style="box-shadow:none;border:.15rem solid #f0ecfb;margin-bottom:.7rem;">' +
          '<h3>👥 학생 명단</h3>' +
          '<p class="page__sub">한 줄에 한 명씩. <b>번호,이름</b> 또는 <b>이름</b>만 적어도 돼요.</p>' +
          '<textarea id="rosterText" rows="7" placeholder="1,김하늘\n2,이보람\n3,박솔">' + S.esc(text) + '</textarea>' +
          '<div class="btn-row" style="margin-top:.6rem;"><button class="btn green" id="saveRoster">명단 저장</button></div>' +
          '<hr style="border:none;border-top:.1rem dashed #e3def5;margin:.9rem 0;">' +
          '<h3>📑 구글 시트에서 가져오기</h3>' +
          '<input type="text" id="sheetUrl" placeholder="https://docs.google.com/spreadsheets/d/.../edit">' +
          '<div class="btn-row" style="margin-top:.6rem;"><button class="btn ghost" id="importSheet">시트에서 가져오기</button></div>' +
        '</div>' +
        '<div class="card" style="box-shadow:none;border:.15rem solid #f0ecfb;">' +
          '<h3>🔒 비밀번호 바꾸기</h3>' +
          '<input type="password" id="newPin" placeholder="새 비밀번호 (4자리 이상)" style="max-width:18rem;">' +
          '<div class="btn-row" style="margin-top:.6rem;"><button class="btn ghost" id="changePin">변경</button></div>' +
        '</div>'
      );
      document.getElementById('saveRoster').onclick = function () {
        S.loading(true, '명단 저장 중…');
        S.call('apiSetRoster', S._pin, document.getElementById('rosterText').value).then(function (r) {
          S.loading(false); S.toast(r.length + '명 저장 완료! ✅'); S.closeModal();
          if (S.state.screen === 'entry') S.go('entry');
        }).catch(function (e) { S.loading(false); S.toast(S.errText(e)); });
      };
      document.getElementById('importSheet').onclick = function () {
        var url = (document.getElementById('sheetUrl').value || '').trim();
        if (!url) { S.toast('시트 주소를 붙여넣어 주세요'); return; }
        S.loading(true, '시트에서 가져오는 중…');
        S.call('apiImportRosterFromSheet', S._pin, url).then(function (r) {
          S.loading(false); S.toast(r.length + '명 가져왔어요! ✅');
          document.getElementById('rosterText').value = r.map(function (x) { return x.number + ',' + x.name; }).join('\n');
        }).catch(function (e) { S.loading(false); S.toast(S.errText(e)); });
      };
      document.getElementById('changePin').onclick = function () {
        S.call('apiChangePin', S._pin, document.getElementById('newPin').value).then(function () {
          S._pin = document.getElementById('newPin').value; S.toast('비밀번호를 바꿨어요 🔒');
        }).catch(function (e) { S.toast(S.errText(e)); });
      };
    }).catch(function (e) { S.toast(S.errText(e)); });
  };

  /* ---------- 부팅 ---------- */
  S.boot = function () {
    S.bootCommon();
    if (S.state.student) S.gotoKey('home', 'next'); else S.gotoKey('entry', 'next');
  };

})(window.S);


/* =========================================================
 *  오프라인 미리보기용 모의 데이터 (구글에 배포하면 사용 안 함)
 * ========================================================= */
var MOCK = (function () {
  var KEY = 'anim_mock_v1';
  function load() { try { return JSON.parse(localStorage.getItem(KEY)) || null; } catch (e) { return null; } }
  function save(db) { localStorage.setItem(KEY, JSON.stringify(db)); }
  function frame(emoji, dx) {
    var cv = document.createElement('canvas'); cv.width = 240; cv.height = 180;
    var c = cv.getContext('2d'); c.fillStyle = '#fff7ff'; c.fillRect(0, 0, 240, 180);
    c.font = '70px serif'; c.textAlign = 'center'; c.fillText(emoji, 60 + dx, 120);
    return cv.toDataURL('image/jpeg', 0.6);
  }
  function frames(emoji) { return [frame(emoji, 0), frame(emoji, 30), frame(emoji, 60), frame(emoji, 100), frame(emoji, 140)]; }
  function db() {
    var d = load();
    if (d) return d;
    d = {
      roster: [
        { id: 'r1', number: 1, name: '김하늘' }, { id: 'r2', number: 2, name: '이보람' },
        { id: 'r3', number: 3, name: '박솔' }, { id: 'r4', number: 4, name: '최바다' },
        { id: 'r5', number: 5, name: '정한결' }, { id: 'r6', number: 6, name: '윤다온' }
      ],
      anims: [
        { id: 'm1', studentId: 'r1', studentName: '김하늘', title: '굴러가는 공', plan: '[이야기] 공이 굴러간다', fps: 6, frames: frames('⚽'), thumbnail: frame('⚽', 0), selfEval: {}, createdAt: 1000 },
        { id: 'm2', studentId: 'r2', studentName: '이보람', title: '날아가는 로켓', plan: '[이야기] 로켓이 난다', fps: 8, frames: frames('🚀'), thumbnail: frame('🚀', 0), selfEval: {}, createdAt: 2000 }
      ],
      comments: [{ id: 'c1', animId: 'm1', studentId: 'r3', studentName: '박솔', text: '공이 진짜 굴러가는 것 같아!', createdAt: 1500 }],
      hearts: [{ animId: 'm2', studentId: 'r1' }, { animId: 'm2', studentId: 'r3' }, { animId: 'm1', studentId: 'r2' }],
      peerEvals: []
    };
    save(d); return d;
  }
  function heartsFor(id) { return db().hearts.filter(function (h) { return h.animId === id; }).length; }
  return {
    apiGetConfig: function () { return { rosterLoaded: db().roster.length > 0, rosterCount: db().roster.length, dataUrl: '#mock' }; },
    apiGetRoster: function () { return db().roster.map(function (r) { return { id: r.id, number: r.number, name: r.name }; }); },
    apiVerifyPin: function (pin) { return String(pin) === '1234'; },
    apiChangePin: function () { return true; },
    apiSetRoster: function (pin, text) {
      var d = db(), rows = [], n = 0;
      String(text).split(/\r?\n/).forEach(function (line) {
        line = line.trim(); if (!line) return; n++;
        var num = n, name = line, m = line.split(',');
        if (m.length >= 2 && /^\d+$/.test(m[0].trim())) { num = parseInt(m[0], 10); name = m.slice(1).join(',').trim(); }
        rows.push({ id: 'r' + Math.random().toString(36).slice(2, 7), number: num, name: name });
      });
      d.roster = rows; save(d); return MOCK.apiGetRoster();
    },
    apiImportRosterFromSheet: function () { throw new Error('미리보기에서는 시트 가져오기를 쓸 수 없어요(배포 후 사용).'); },
    apiSaveAnimation: function (p) {
      var d = db(), id = 'm' + Math.random().toString(36).slice(2, 8);
      d.anims.push({ id: id, studentId: p.studentId, studentName: p.studentName, title: p.title, plan: p.plan, fps: p.fps, frames: p.frames, thumbnail: p.thumbnail, selfEval: p.selfEval, createdAt: d.anims.length + 3000 });
      save(d); return { id: id };
    },
    apiListAnimations: function () {
      return db().anims.map(function (a) {
        return { id: a.id, studentId: a.studentId, studentName: a.studentName, title: a.title, fps: a.fps, frameCount: a.frames.length, thumbnail: a.thumbnail, hearts: heartsFor(a.id), createdAt: a.createdAt };
      }).sort(function (x, y) { return y.hearts - x.hearts || y.createdAt - x.createdAt; });
    },
    apiGetAnimationDetail: function (animId, viewerId) {
      var d = db(), a = d.anims.filter(function (x) { return x.id === animId; })[0];
      if (!a) throw new Error('작품을 찾을 수 없어요.');
      var peer = d.peerEvals.filter(function (p) { return p.animId === animId; });
      var sums = { story: 0, motion: 0, creative: 0 };
      peer.forEach(function (p) { sums.story += p.ratings.story || 0; sums.motion += p.ratings.motion || 0; sums.creative += p.ratings.creative || 0; });
      var cnt = peer.length;
      var avg = { story: cnt ? Math.round(sums.story / cnt * 10) / 10 : 0, motion: cnt ? Math.round(sums.motion / cnt * 10) / 10 : 0, creative: cnt ? Math.round(sums.creative / cnt * 10) / 10 : 0 };
      var mine = peer.filter(function (p) { return p.studentId === viewerId; })[0];
      return {
        meta: { id: a.id, studentName: a.studentName, title: a.title, plan: a.plan, selfEval: a.selfEval },
        fps: a.fps, frames: a.frames, hearts: heartsFor(animId),
        hearted: d.hearts.some(function (h) { return h.animId === animId && h.studentId === viewerId; }),
        comments: d.comments.filter(function (c) { return c.animId === animId; }),
        peerSummary: { count: cnt, avg: avg }, myPeerEval: mine ? mine.ratings : null
      };
    },
    apiToggleHeart: function (animId, sid) {
      var d = db(), idx = -1;
      d.hearts.forEach(function (h, i) { if (h.animId === animId && h.studentId === sid) idx = i; });
      if (idx >= 0) d.hearts.splice(idx, 1); else d.hearts.push({ animId: animId, studentId: sid });
      save(d); return { hearted: idx < 0, hearts: heartsFor(animId) };
    },
    apiAddComment: function (animId, sid, name, text) {
      var d = db(), c = { id: 'c' + Math.random().toString(36).slice(2, 7), animId: animId, studentId: sid, studentName: name, text: text, createdAt: Date.now() };
      d.comments.push(c); save(d); return { id: c.id, studentName: name, text: text, createdAt: c.createdAt };
    },
    apiAddPeerEval: function (animId, sid, name, ratings) {
      var d = db(), ex = d.peerEvals.filter(function (p) { return p.animId === animId && p.studentId === sid; })[0];
      if (ex) ex.ratings = ratings; else d.peerEvals.push({ animId: animId, studentId: sid, studentName: name, ratings: ratings });
      save(d); return { updated: !!ex };
    }
  };
})();

(function () {
  function start() { window.S.boot(); }
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', start);
  else start();
})();
